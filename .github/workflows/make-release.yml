name: Make Release
on:
  workflow_dispatch:
    inputs:
      info:
        description: 'Description of this Release'
        required: true
        type: string
  push:
    branches:
      - master
    paths:
      - 'pom.xml'

permissions:
  contents: write

jobs:
  build_jar:
    name: Build Jar
    # Dependabot에 의한 병합이거나 수동 실행일 때만 진행
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'dependabot')
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven

      - name: Bump Patch Version
        # Dependabot push일 때만 실행하여 버전을 1.1.4 -> 1.1.5 형태로 올림
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'dependabot')
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # 마지막 패치 버전 숫자만 +1
          NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{$3 = $3 + 1} 1' OFS=.)
          
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump patch version to $NEW_VERSION [skip ci]"
          git push

      - name: Extract Version from pom.xml
        id: get_version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Extracted Version: $POM_VERSION"
          echo "VERSION=$POM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify

      - name: Rename jar
        run: mv target/*-All.jar Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar
          if-no-files-found: error

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_jar
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: .

      - name: Show Artifacts
        run: ls -R

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.build_jar.outputs.app_version }}
          name: Version ${{ needs.build_jar.outputs.app_version }}
          draft: false
          prerelease: false
          artifacts: "*.jar"
          body: |
            ${{ github.event.inputs.info || github.event.head_commit.message }}
            
            ---  
            # 다운로드: [Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar](https://github.com/Hyfata/Hyfata-MusicBot/releases/download/${{ needs.build_jar.outputs.app_version }}/Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar)

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build_jar, create_release]
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: .

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          source: "Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar"
          target: ${{ secrets.REMOTE_TARGET_DIR }}

      - name: Restart Bot Service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            cd ${{ secrets.REMOTE_TARGET_DIR }}

            # Change the bot jar file name
            ln -sf Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar Hyfata-MusicBot-latest.jar
            
            # Restart the bot.
            # It should be need "restart.sh"
            ./restart.sh
