name: Make Release
on:
  workflow_dispatch:
    inputs:
      info:
        description: 'Description of this Release'
        required: true
        type: string

jobs:
  build_jar:
    name: Build Jar
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3 -> v4로 업데이트

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # v3 -> v4로 업데이트
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: maven

      - name: Extract Version from pom.xml
        id: get_version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Extracted Version: $POM_VERSION"
          echo "VERSION=$POM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify

      - name: Rename jar
        run: mv target/*-All.jar Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar

      - name: Upload jar
        uses: actions/upload-artifact@v4 # v3 -> v4로 업데이트 (에러 원인 해결)
        with:
          name: jar
          path: Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar
          if-no-files-found: error

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_jar
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4 # v3.0.0 -> v4로 업데이트 (에러 원인 해결)
        with:
          name: jar
          path: .

      - name: Show Artifacts
        run: ls -R

      - name: Create Release
        uses: ncipollo/release-action@v1 # 이 액션은 v1이 최신이므로 그대로 둡니다.
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.build_jar.outputs.app_version }}
          name: Version ${{ needs.build_jar.outputs.app_version }}
          draft: true
          prerelease: false
          artifacts: "*.jar"
          body: |
            ${{ github.event.inputs.info }}
            
            ---
            ### Setup
            https://jmusicbot.com/setup  
            https://jmusicbot.com/config  
            # Download: [Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar](https://github.com/jagrosh/MusicBot/releases/download/${{ needs.build_jar.outputs.app_version }}/Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar)
