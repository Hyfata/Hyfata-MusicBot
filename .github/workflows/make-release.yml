name: Make Release
on:
  workflow_dispatch:
    inputs:
      info:
        description: 'Description of this Release'
        required: true
        type: string

jobs:
  build_jar:
    name: Build Jar
    runs-on: ubuntu-latest
    # 다음 Job(create_release)으로 넘겨줄 변수(버전)를 선언합니다.
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: maven

      - name: Extract Version from pom.xml
        id: get_version
        run: |
          # Maven을 통해 pom.xml의 <version> 값을 읽어옵니다.
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Extracted Version: $POM_VERSION"
          # 추출한 버전을 GitHub Actions의 output으로 등록합니다.
          echo "VERSION=$POM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots verify

      - name: Rename jar
        # 위에서 추출한 버전(steps.get_version.outputs.VERSION)을 사용해 이름을 바꿉니다.
        run: mv target/*-All.jar Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar

      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: jar
          path: Hyfata-MusicBot-${{ steps.get_version.outputs.VERSION }}.jar
          if-no-files-found: error

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_jar # build_jar가 끝난 후에 실행되도록 의존성을 설정합니다.
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v3.0.0
        with:
          name: jar
          path: .

      - name: Show Artifacts
        run: ls -R

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 이전 Job에서 넘겨준 버전(needs.build_jar.outputs.app_version)을 사용합니다.
          tag: ${{ needs.build_jar.outputs.app_version }}
          name: Version ${{ needs.build_jar.outputs.app_version }}
          draft: true
          prerelease: false
          artifacts: "*.jar"
          body: |
            ${{ github.event.inputs.info }}
            
            ---
            ### Setup
            https://jmusicbot.com/setup  
            https://jmusicbot.com/config  
            # Download: [Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar](https://github.com/jagrosh/MusicBot/releases/download/${{ needs.build_jar.outputs.app_version }}/Hyfata-MusicBot-${{ needs.build_jar.outputs.app_version }}.jar)
